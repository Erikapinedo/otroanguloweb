    <script>
      (function () {
        /* Sync _language field with active site language */
        function syncLang() {
          var el = document.getElementById("form-lang");
          if (el) el.value = window.OtroAnguloI18n.getLang();
        }
        var orig = window.OtroAnguloI18n.setLang;
        window.OtroAnguloI18n.setLang = function (lang) {
          orig(lang);
          syncLang();
        };
        syncLang();

        /* Submit directly to Formspree, bypassing Webflow's form handler */
        document.addEventListener("DOMContentLoaded", function () {
          var form = document.getElementById("email-form");
          if (!form) return;
          form.addEventListener(
            "submit",
            function (e) {
              e.preventDefault();
              e.stopImmediatePropagation();
              syncLang();
              var wrapper = form.closest(".w-form");
              var successEl = wrapper && wrapper.querySelector(".w-form-done");
              var errorEl = wrapper && wrapper.querySelector(".w-form-fail");
              var submitBtn = form.querySelector('input[type="submit"]');
              if (submitBtn) submitBtn.disabled = true;
              fetch(form.action, {
                method: "POST",
                body: new FormData(form),
                headers: { Accept: "application/json" },
              })
                .then(function (res) {
                  if (res.ok) {
                    form.style.display = "none";
                    if (successEl) successEl.style.display = "block";
                  } else {
                    if (errorEl) errorEl.style.display = "block";
                    if (submitBtn) submitBtn.disabled = false;
                  }
                })
                .catch(function () {
                  if (errorEl) errorEl.style.display = "block";
                  if (submitBtn) submitBtn.disabled = false;
                });
            },
            true,
          );
        });
      })();
    </script>
